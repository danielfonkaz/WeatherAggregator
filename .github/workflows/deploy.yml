name: Deploy Lambda
on:
  push:
    branches:
      - master
      - 'feature/*'
jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Lint and Syntax Check
        run: |
          python -m py_compile *.py
          pip install flake8
          flake8 . --exclude=venv,.venv,env,bin,lib,deps --count --statistics  --ignore=E501,E127,E128,W503,E126
      - name: Run Unit Tests
        # keep pytest out of production, only used for testing
        run: | 
          pip install pytest
          pip install -r requirements.txt
          pytest test_city_weather_data.py

        # steps needed for container deployment
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Environment Variables
          # Sanitize the branch name for AWS (removes slashes/dots)
        run: |
          CLEAN_NAME=$(echo ${GITHUB_REF_NAME} | sed 's/[^a-zA-Z0-9-]/-/g')
          echo "ENV_NAME=$CLEAN_NAME" >> $GITHUB_ENV
          if [ "${{ github.ref_name }}" == "master" ]; then
            echo "LAMBDA_NAME=weatherAggregator" >> $GITHUB_ENV
          else
            echo "LAMBDA_NAME=weatherAggregator-$CLEAN_NAME" >> $GITHUB_ENV
          fi

      - name: Build, Tag, and Push Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: weather-aggregator
        run: |
          # Tag with branch name for isolation, and SHA for uniqueness
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.ENV_NAME }} .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.ENV_NAME }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      - name: Ensure Lambda Exists or Update Code
        run: |
          # Check if the branch-specific Lambda exists
          if ! aws lambda get-function --function-name ${{ env.LAMBDA_NAME }} > /dev/null 2>&1; then
            echo "Creating new Lambda for branch: ${{ env.LAMBDA_NAME }}"
            aws lambda create-function \
              --function-name ${{ env.LAMBDA_NAME }} \
              --package-type Image \
              --code ImageUri=${{ steps.login-ecr.outputs.registry }}/weather-aggregator:${{ github.sha }} \
              --role arn:aws:iam::179776888271:role/service-role/sampleRestFunction-role-irjw02b8
          else
            echo "Updating existing Lambda: ${{ env.LAMBDA_NAME }}"
            aws lambda update-function-code \
              --function-name ${{ env.LAMBDA_NAME }} \
              --image-uri ${{ steps.login-ecr.outputs.registry }}/weather-aggregator:${{ github.sha }}
          fi

      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_NAME }}

      - name: Update Lambda Environment Variables
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ env.LAMBDA_NAME }} \
            --environment "Variables={WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}}"

      - name: Create or Update Lambda Function URL
        id: lambda-url
        run: |
          # Create the Function URL if it doesn't exist
          aws lambda create-function-url-config \
            --function-name ${{ env.LAMBDA_NAME }} \
            --auth-type NONE || aws lambda update-function-url-config \
            --function-name ${{ env.LAMBDA_NAME }} \
            --auth-type NONE

          # Add permissions so anyone can invoke the URL
          aws lambda add-permission \
            --function-name ${{ env.LAMBDA_NAME }} \
            --statement-id FunctionURLAllowPublicAccess \
            --action lambda:InvokeFunctionUrl \
            --principal "*" \
            --function-url-auth-type NONE || echo "InvokeFunctionUrl permission already exists"
        
          aws lambda add-permission \
            --function-name ${{ env.LAMBDA_NAME }} \
            --statement-id AllowPublicInvokeBypass \
            --action lambda:InvokeFunction \
            --principal "*" \
            --function-url-auth-type NONE || echo "InvokeFunction permission already exists"

          # Get the URL to display in the logs
          URL=$(aws lambda get-function-url-config --function-name ${{ env.LAMBDA_NAME }} --query 'FunctionUrl' --output text)
          echo "LAMBDA_URL=$URL" >> $GITHUB_ENV
          echo "The Function URL is: $URL"

      - name: Generate Deployment Summary
        run: |
          echo "## Feature Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Your branch-specific environment is live and ready for testing." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Lambda Name** | \`${{ env.LAMBDA_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Function URL** | [Click here to open](${{ env.LAMBDA_URL }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> [!TIP]" >> $GITHUB_STEP_SUMMARY
          echo "> This Lambda will stay active until the branch is deleted." >> $GITHUB_STEP_SUMMARY